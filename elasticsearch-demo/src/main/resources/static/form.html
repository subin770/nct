<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>보안관제 종합시스템 - 권고문</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.js"></script>

    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7f9;
            margin: 0;
            padding: 0;
            font-size: 13px; /* 16px에서 13px로 수정 (index.html과 동일하게) */
            color: #333;
        }

        .header {
            background-color: #2c4a91;
            color: white;
            padding: 13.5px 20px;
            font-size: 16px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .form-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-top: 2px solid #2c4a91;
            margin-top: 10px;
        }

        .form-table th {
            background: #f8f9fa;
            width: 140px; /* 너비를 살짝 줄임 */
            padding: 10px 15px; /* 패딩 조절 */
            border: 1px solid #ddd;
            text-align: right;
            font-weight: bold;
            font-size: 13px;
        }

        .form-table td {
            padding: 8px 12px;
            border: 1px solid #ddd;
            font-size: 13px;
        }

        .required::after {
            content: ' *';
            color: #e74c3c;
            font-weight: bold;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 5px 8px; /* 입력창 내부 여백 축소 */
            border: 1px solid #ccc;
            border-radius: 2px;
            box-sizing: border-box;
            font-size: 13px;
        }

        .info-text {
            color: #333;
            font-weight: normal;
        }

        .footer-btns {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 버튼 크기도 폰트 사이즈에 맞춰 조정 */
        .btn-save, .btn-delete, .btn-close {
            padding: 8px 30px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-save { background: #2c4a91; color: white; border: none; }
        .btn-delete { background: #e74c3c; color: white; border: none; }
        .btn-close { background: white; border: 1px solid #ccc; }

        .file-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-file-custom {
            background: #f1f1f1;
            border: 1px solid #ccc;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        #fileNameDisplay {
            color: #2c4a91;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }
        
        /* Summernote 에디터 내부 폰트 크기 강제 조정 */
        .note-editor.note-frame .note-editing-area .note-editable {
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="header">보안관제 종합시스템</div>
    <div class="container">
        <div style="overflow: hidden; margin-bottom: 13px;">
            <span style="font-weight:bold; font-size:14px;">권고문 관리</span>
        </div>

        <table class="form-table">
            <tr>
                <th class="required">제목</th>
                <td colspan="3"><input type="text" id="title" placeholder="제목을 입력해 주세요."></td>
            </tr>
            <tr>
                <th class="required">분류</th>
                <td colspan="3">
                    <label style="font-weight: normal; cursor: pointer; margin-right: 15px;">
                        <input type="radio" name="type" value="일반" id="type_n" checked> 일반
                    </label>
                    <label style="font-weight: normal; cursor: pointer;">
                        <input type="radio" name="type" value="필수" id="type_u"> 필수
                    </label>
                </td>
            </tr>
            <tr class="edit-only" style="display:none;">
                <th>등록일</th>
                <td id="td_regDate" class="info-text"></td>
                <th>통보일</th>
                <td id="td_noticeDate" class="info-text"></td>
            </tr>
            <tr class="edit-only" style="display:none;">
                <th>처리 상태</th>
                <td id="td_status" class="info-text"></td>
                <th>접수자</th>
                <td class="info-text">조수빈</td>
            </tr>
            <tr>
                <th class="required">개요</th>
                <td colspan="3"><textarea id="summary" style="height:60px;"></textarea></td>
            </tr>
            <tr>
                <th class="required">내용</th>
                <td colspan="3">
                    <div id="summernote"></div>
                </td>
            </tr>
            <tr>
                <th class="required">대책</th>
                <td colspan="3"><textarea id="action" style="height:60px;"></textarea></td>
            </tr>
            <tr>
                <th>관련사이트</th>
                <td colspan="3"><input type="text" id="relatedSite"></td>
            </tr>
            <tr>
                <th>적용OS</th>
                <td colspan="3"><input type="text" id="targetOs"></td>
            </tr>
            <tr>
                <th>패치관련</th>
                <td colspan="3"><input type="text" id="patchInfo"></td>
            </tr>
            <tr>
                <th>첨부파일 [최대 100MB]</th>
                <td colspan="3">
                    <div class="file-wrapper">
                        <input type="file" id="fileInput" style="display: none;" onchange="handleFileChange()">
                        <button type="button" class="btn-file-custom"
                            onclick="document.getElementById('fileInput').click()">파일 선택</button>
                        <div id="fileNameDisplay" onclick="downloadFile()"></div>
                    </div>
                </td>
            </tr>
        </table>

        <div class="footer-btns">
            <div><button id="delBtn" class="btn-delete" style="display:none;">삭제</button></div>
            <div>
                <button id="mainBtn" class="btn-save">저장</button>
                <button class="btn-close" onclick="location.href='index.html'">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const noticeId = urlParams.get('id');
        let selectedFileName = "";

        $(document).ready(function () {
            $('#summernote').summernote({ 
                height: 350, 
                lang: 'ko-KR', 
                placeholder: '내용을 입력해 주세요.',
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
            if (noticeId) {
                document.getElementById('mainBtn').innerText = "수정";
                document.getElementById('delBtn').style.display = "inline-block";
                document.querySelectorAll('.edit-only').forEach(el => el.style.display = '');
                fetchNoticeDetail(noticeId);
            }
            document.getElementById('mainBtn').onclick = saveOrUpdate;
            document.getElementById('delBtn').onclick = deleteNotice;
        });

        function handleFileChange() {
            const fileInput = document.getElementById('fileInput');
            const display = document.getElementById('fileNameDisplay');
            if (fileInput.files.length > 0) {
                selectedFileName = fileInput.files[0].name;
                display.innerText = "선택됨: " + selectedFileName;
            }
        }

        function downloadFile() {
            if (!selectedFileName) return;
            alert(selectedFileName + " 파일을 다운로드합니다.");
        }

        async function fetchNoticeDetail(id) {
            try {
                const response = await fetch(`/api/notice/${id}`);
                const notice = await response.json();

                document.getElementById('title').value = notice.title || "";
                document.getElementById('summary').value = notice.summary || "";
                $('#summernote').summernote('code', notice.content || "");
                document.getElementById('action').value = notice.action || "";
                document.getElementById('relatedSite').value = notice.relatedSite || "";
                document.getElementById('targetOs').value = notice.targetOs || "";
                document.getElementById('patchInfo').value = notice.patchInfo || "";

                document.getElementById('td_regDate').innerText = notice.regDate || "-";
                document.getElementById('td_noticeDate').innerText = notice.noticeDate || notice.regDate;
                document.getElementById('td_status').innerText = notice.status || "통보 완료";

                if (notice.type === "필수") document.getElementById('type_u').checked = true;

                if (notice.fileName) {
                    selectedFileName = notice.fileName;
                    document.getElementById('fileNameDisplay').innerText = "현재 파일: " + notice.fileName;
                }
            } catch (e) { console.error(e); }
        }

        async function saveOrUpdate() {
            const noticeData = {
                id: noticeId,
                title: document.getElementById('title').value,
                type: document.querySelector('input[name="type"]:checked').value,
                summary: document.getElementById('summary').value,
                content: $('#summernote').summernote('code'),
                action: document.getElementById('action').value,
                relatedSite: document.getElementById('relatedSite').value,
                targetOs: document.getElementById('targetOs').value,
                patchInfo: document.getElementById('patchInfo').value,
                fileName: selectedFileName
            };

            if (!noticeData.title) { alert("제목 입력 필수"); return; }

            const res = await fetch('/api/notice/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(noticeData)
            });
            if (res.ok) { alert("처리되었습니다."); location.href = 'index.html'; }
        }

        async function deleteNotice() {
            if (!confirm("삭제하시겠습니까?")) return;
            const res = await fetch(`/api/notice/${noticeId}`, { method: 'DELETE' });
            if (res.ok) { alert("삭제 완료"); location.href = 'index.html'; }
        }
    </script>
</body>

</html>
